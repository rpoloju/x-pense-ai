<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="radialAccent" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0e1b29" />
      <stop offset="100%" stop-color="#030712" />
    </radialGradient>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F5FF" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#radialAccent)" />
  <rect width="500" height="500" x="6" y="6" rx="122" fill="none" stroke="#00F5FF" stroke-opacity="0.15" stroke-width="4" />
  
  <!-- Stylized Elegant "A" Chart Symbol -->
  <g transform="translate(106, 110)">
    <!-- Main Left-to-Right Ascending Line -->
    <path d="M 30,220 L 150,50 L 270,220" fill="none" stroke="url(#neonGradient)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
    <!-- Crossbar of A forming a trend bullet -->
    <path d="M 85,150 L 215,150" fill="none" stroke="#FFFFFF" stroke-opacity="0.8" stroke-width="16" stroke-linecap="round" />
    <!-- Success arrow / upward leaf -->
    <circle cx="150" cy="50" r="16" fill="#FFFFFF" />
  </g>
</svg>
