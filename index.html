<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aura Wealth | Personal Finance & Calculator Suite</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#030712" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icon-512.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Clean up previous service worker registrations that could interfere in development
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(registrations => {
          for (let registration of registrations) {
            registration.unregister().then(success => {
              if (success) {
                console.log('Unregistered active service worker to prevent page loading issues');
                window.location.reload();
              }
            });
          }
        });
      }
    </script>
  </body>
</html>
